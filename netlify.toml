[build]
  command = "npm install --legacy-peer-deps && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS    = "--legacy-peer-deps"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Increase timeout for upload and KYC routes
[functions."api-upload"]
  timeout = 30

[functions."api-kyc"]
  timeout = 30